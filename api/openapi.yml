openapi: 3.1.0
info:
  title: AI Checklist Backend
  version: 0.1.0
paths:
  /api/health:
    get:
      tags:
        - health
      summary: Health Check
      operationId: health_check_api_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Health Check Api Health Get
  /api/users/create:
    post:
      tags:
        - users
      summary: Create User Route
      operationId: create_user_route_api_users_create_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCreateResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/users:
    get:
      tags:
        - users
      summary: List Users Route
      operationId: list_users_route_api_users_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
  '/api/users/{user_id}':
    get:
      tags:
        - users
      summary: Get User Route
      operationId: get_user_route_api_users__user_id__get
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
            title: User Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserGetResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  '/api/users/delete/{user_id}':
    delete:
      tags:
        - users
      summary: Delete User Route
      operationId: delete_user_route_api_users_delete__user_id__delete
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
            title: User Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDeleteResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/auth/login:
    post:
      tags:
        - auth
      summary: Login
      operationId: login_api_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/auth/me:
    get:
      tags:
        - auth
      summary: Read Me
      operationId: read_me_api_auth_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
      security:
        - HTTPBearer: []
    patch:
      tags:
        - auth
      summary: Update Me
      operationId: update_me_api_auth_me_patch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CurrentUserUpdateRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
        - HTTPBearer: []
  /api/auth/me/password:
    patch:
      tags:
        - auth
      summary: Change Me Password
      operationId: change_me_password_api_auth_me_password_patch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
        - HTTPBearer: []
  /api/checklists:
    get:
      tags:
        - checklists
      summary: List Checklists Route
      operationId: list_checklists_route_api_checklists_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChecklistListResponse'
      security:
        - HTTPBearer: []
  '/api/checklists/{checklist_id}':
    get:
      tags:
        - checklists
      summary: Get Checklist Route
      operationId: get_checklist_route_api_checklists__checklist_id__get
      security:
        - HTTPBearer: []
      parameters:
        - name: checklist_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
            title: Checklist Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChecklistGetResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
        - checklists
      summary: Patch Checklist Route
      operationId: patch_checklist_route_api_checklists__checklist_id__patch
      security:
        - HTTPBearer: []
      parameters:
        - name: checklist_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
            title: Checklist Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChecklistOperationsPatchRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChecklistUpdateResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/checklists/create:
    post:
      tags:
        - checklists
      summary: Create Checklist Route
      operationId: create_checklist_route_api_checklists_create_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChecklistCreateRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChecklistCreateResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
        - HTTPBearer: []
  '/api/checklists/delete/{checklist_id}':
    delete:
      tags:
        - checklists
      summary: Delete Checklist Route
      operationId: delete_checklist_route_api_checklists_delete__checklist_id__delete
      security:
        - HTTPBearer: []
      parameters:
        - name: checklist_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
            title: Checklist Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChecklistDeleteResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/files/upload/image:
    post:
      tags:
        - files
      summary: Upload Image Route
      operationId: upload_image_route_api_files_upload_image_post
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: >-
                #/components/schemas/Body_upload_image_route_api_files_upload_image_post
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
        - HTTPBearer: []
  /api/files/upload/pdf:
    post:
      tags:
        - files
      summary: Upload Pdf Route
      operationId: upload_pdf_route_api_files_upload_pdf_post
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: >-
                #/components/schemas/Body_upload_pdf_route_api_files_upload_pdf_post
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
        - HTTPBearer: []
  '/api/files/{file_id}/raw':
    get:
      tags:
        - files
      summary: Get File Raw Route
      description: |-
        Stream the raw bytes of a stored file. The frontend uses this to render
        images (e.g. an `imageBlock.images[].url`) and to feed images to the AI
        /observe endpoint. Ownership is enforced — non-owners get 404.
      operationId: get_file_raw_route_api_files__file_id__raw_get
      security:
        - HTTPBearer: []
      parameters:
        - name: file_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
            title: File Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  '/api/files/delete_file/{file_id}':
    delete:
      tags:
        - files
      summary: Delete File Route
      operationId: delete_file_route_api_files_delete_file__file_id__delete
      security:
        - HTTPBearer: []
      parameters:
        - name: file_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
            title: File Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileDeleteResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/ai/checklists/create-from-text:
    post:
      tags:
        - ai
      summary: Ai Create From Text
      operationId: ai_create_from_text_api_ai_checklists_create_from_text_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiCreateFromTextRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChecklistCreateResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
        - HTTPBearer: []
  '/api/ai/checklists/{checklist_id}/edit':
    post:
      tags:
        - ai
      summary: Ai Edit Checklist
      operationId: ai_edit_checklist_api_ai_checklists__checklist_id__edit_post
      security:
        - HTTPBearer: []
      parameters:
        - name: checklist_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
            title: Checklist Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiEditChecklistRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  '/api/ai/checklists/{checklist_id}/observe':
    post:
      tags:
        - ai
      summary: Ai Observe
      description: >-
        Vision flow. The user has already uploaded an image (POST
        /files/upload/image)

        and passes the resulting image_id here along with a natural-language

        instruction or question. The AI sees the image + the checklist and can:


        - reply in text only (e.g. "Yes, I see 4 screws installed"), OR

        - call `add_image_to_block` to attach the image to a specific imageBlock
        —
          the server appends the new entry to that block's `images` array and
          persists the checklist (with `checklist_prev` snapshotted for undo).

        If the user rejects the image afterwards, they call DELETE
        /api/files/{id}

        to remove the unused upload from Supabase Storage.
      operationId: ai_observe_api_ai_checklists__checklist_id__observe_post
      security:
        - HTTPBearer: []
      parameters:
        - name: checklist_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
            title: Checklist Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiObserveRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    AddComponentOperation:
      properties:
        operation:
          type: string
          const: addComponent
          title: Operation
        targetContainerId:
          type: string
          title: Targetcontainerid
        position:
          anyOf:
            - type: string
            - additionalProperties: true
              type: object
          title: Position
          default: end
        component:
          anyOf:
            - $ref: '#/components/schemas/AddComponentPayload'
            - additionalProperties: true
              type: object
          title: Component
      type: object
      required:
        - operation
        - targetContainerId
        - component
      title: AddComponentOperation
    AddComponentPayload:
      properties:
        type:
          type: string
          title: Type
        label:
          type: string
          minLength: 1
          title: Label
      type: object
      required:
        - type
        - label
      title: AddComponentPayload
    AiCreateFromTextRequest:
      properties:
        prompt:
          type: string
          title: Prompt
        title:
          anyOf:
            - type: string
            - type: 'null'
          title: Title
        description:
          anyOf:
            - type: string
            - type: 'null'
          title: Description
      type: object
      required:
        - prompt
      title: AiCreateFromTextRequest
    AiEditChecklistRequest:
      properties:
        instruction:
          type: string
          title: Instruction
      type: object
      required:
        - instruction
      title: AiEditChecklistRequest
    AiObserveChatMessage:
      properties:
        role:
          type: string
          title: Role
        content:
          type: string
          title: Content
      type: object
      required:
        - role
        - content
      title: AiObserveChatMessage
      description: 'One turn of conversation history, kept flat for easy frontend handling.'
    AiObserveRequest:
      properties:
        instruction:
          type: string
          title: Instruction
        image_id:
          title: Image Id
        prior_messages:
          anyOf:
            - items:
                $ref: '#/components/schemas/AiObserveChatMessage'
              type: array
            - type: 'null'
          title: Prior Messages
      type: object
      required:
        - instruction
        - image_id
      title: AiObserveRequest
      description: >-
        Vision request. The image must already exist in storage (uploaded via

        POST /api/files/upload/image) — pass its id here. The frontend keeps the

        running conversation in memory and replays it via `prior_messages` so
        the

        user can ask follow-up questions about the same image.
    AiResponse:
      properties:
        checklist:
          additionalProperties: true
          type: object
          title: Checklist
        reply:
          type: string
          title: Reply
        applied_calls:
          type: integer
          title: Applied Calls
        skipped:
          items:
            $ref: '#/components/schemas/AiSkippedCall'
          type: array
          title: Skipped
      type: object
      required:
        - checklist
        - reply
        - applied_calls
        - skipped
      title: AiResponse
      description: >-
        Returned by the AI edit endpoint. `checklist` is the resulting JSON tree

        (after all valid tool calls were applied). `reply` is the model's

        natural-language message to the user — the frontend shows this in the
        chat

        panel. `skipped` lists any tool calls that failed validation so the
        frontend

        can surface them for debugging.
    AiSkippedCall:
      properties:
        call:
          additionalProperties: true
          type: object
          title: Call
        reason:
          type: string
          title: Reason
      type: object
      required:
        - call
        - reason
      title: AiSkippedCall
    AuthResponse:
      properties:
        access_token:
          type: string
          title: Access Token
        token_type:
          type: string
          title: Token Type
          default: bearer
        user:
          $ref: '#/components/schemas/UserResponse'
      type: object
      required:
        - access_token
        - user
      title: AuthResponse
    Body_upload_image_route_api_files_upload_image_post:
      properties:
        file:
          type: string
          contentMediaType: application/octet-stream
          title: File
        checklist_id:
          anyOf:
            - type: string
              format: uuid
            - type: 'null'
          title: Checklist Id
      type: object
      required:
        - file
      title: Body_upload_image_route_api_files_upload_image_post
    Body_upload_pdf_route_api_files_upload_pdf_post:
      properties:
        file:
          type: string
          contentMediaType: application/octet-stream
          title: File
        checklist_id:
          anyOf:
            - type: string
              format: uuid
            - type: 'null'
          title: Checklist Id
      type: object
      required:
        - file
      title: Body_upload_pdf_route_api_files_upload_pdf_post
    ChangePasswordRequest:
      properties:
        current_password:
          type: string
          title: Current Password
        new_password:
          type: string
          title: New Password
      type: object
      required:
        - current_password
        - new_password
      title: ChangePasswordRequest
    ChecklistCreateRequest:
      properties:
        title:
          type: string
          title: Title
        description:
          anyOf:
            - type: string
            - type: 'null'
          title: Description
        checklist:
          additionalProperties: true
          type: object
          title: Checklist
      type: object
      required:
        - title
        - checklist
      title: ChecklistCreateRequest
    ChecklistCreateResponse:
      properties:
        title:
          type: string
          title: Title
        description:
          anyOf:
            - type: string
            - type: 'null'
          title: Description
        checklist:
          additionalProperties: true
          type: object
          title: Checklist
        id:
          type: string
          format: uuid
          title: Id
        user_id:
          type: string
          format: uuid
          title: User Id
        created_at:
          type: string
          format: date-time
          title: Created At
        updated_at:
          type: string
          format: date-time
          title: Updated At
        checklist_prev:
          anyOf:
            - additionalProperties: true
              type: object
            - type: 'null'
          title: Checklist Prev
        total_items:
          type: integer
          title: Total Items
          default: 0
        edited_items:
          type: integer
          title: Edited Items
          default: 0
        completed_items:
          type: integer
          title: Completed Items
          default: 0
      type: object
      required:
        - title
        - checklist
        - id
        - user_id
        - created_at
        - updated_at
      title: ChecklistCreateResponse
    ChecklistDeleteResponse:
      properties:
        message:
          type: string
          title: Message
      type: object
      required:
        - message
      title: ChecklistDeleteResponse
    ChecklistGetResponse:
      properties:
        title:
          type: string
          title: Title
        description:
          anyOf:
            - type: string
            - type: 'null'
          title: Description
        checklist:
          additionalProperties: true
          type: object
          title: Checklist
        id:
          type: string
          format: uuid
          title: Id
        user_id:
          type: string
          format: uuid
          title: User Id
        created_at:
          type: string
          format: date-time
          title: Created At
        updated_at:
          type: string
          format: date-time
          title: Updated At
        checklist_prev:
          anyOf:
            - additionalProperties: true
              type: object
            - type: 'null'
          title: Checklist Prev
        total_items:
          type: integer
          title: Total Items
          default: 0
        edited_items:
          type: integer
          title: Edited Items
          default: 0
        completed_items:
          type: integer
          title: Completed Items
          default: 0
      type: object
      required:
        - title
        - checklist
        - id
        - user_id
        - created_at
        - updated_at
      title: ChecklistGetResponse
    ChecklistListResponse:
      properties:
        checklists:
          items:
            $ref: '#/components/schemas/ChecklistSummaryResponse'
          type: array
          title: Checklists
      type: object
      required:
        - checklists
      title: ChecklistListResponse
    ChecklistOperationsPatchRequest:
      properties:
        operations:
          items:
            oneOf:
              - $ref: '#/components/schemas/AddComponentOperation'
              - $ref: '#/components/schemas/UpdateComponentOperation'
              - $ref: '#/components/schemas/DeleteComponentOperation'
              - $ref: '#/components/schemas/MoveComponentOperation'
              - $ref: '#/components/schemas/SwapComponentOperation'
            discriminator:
              propertyName: operation
              mapping:
                addComponent: '#/components/schemas/AddComponentOperation'
                deleteComponent: '#/components/schemas/DeleteComponentOperation'
                moveComponent: '#/components/schemas/MoveComponentOperation'
                swapComponent: '#/components/schemas/SwapComponentOperation'
                updateComponent: '#/components/schemas/UpdateComponentOperation'
          type: array
          title: Operations
      type: object
      required:
        - operations
      title: ChecklistOperationsPatchRequest
    ChecklistSummaryResponse:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        user_id:
          type: string
          format: uuid
          title: User Id
        title:
          type: string
          title: Title
        description:
          anyOf:
            - type: string
            - type: 'null'
          title: Description
        created_at:
          type: string
          format: date-time
          title: Created At
        updated_at:
          type: string
          format: date-time
          title: Updated At
        total_items:
          type: integer
          title: Total Items
          default: 0
        edited_items:
          type: integer
          title: Edited Items
          default: 0
        completed_items:
          type: integer
          title: Completed Items
          default: 0
      type: object
      required:
        - id
        - user_id
        - title
        - created_at
        - updated_at
      title: ChecklistSummaryResponse
    ChecklistUpdateResponse:
      properties:
        title:
          type: string
          title: Title
        description:
          anyOf:
            - type: string
            - type: 'null'
          title: Description
        checklist:
          additionalProperties: true
          type: object
          title: Checklist
        id:
          type: string
          format: uuid
          title: Id
        user_id:
          type: string
          format: uuid
          title: User Id
        created_at:
          type: string
          format: date-time
          title: Created At
        updated_at:
          type: string
          format: date-time
          title: Updated At
        checklist_prev:
          anyOf:
            - additionalProperties: true
              type: object
            - type: 'null'
          title: Checklist Prev
        total_items:
          type: integer
          title: Total Items
          default: 0
        edited_items:
          type: integer
          title: Edited Items
          default: 0
        completed_items:
          type: integer
          title: Completed Items
          default: 0
      type: object
      required:
        - title
        - checklist
        - id
        - user_id
        - created_at
        - updated_at
      title: ChecklistUpdateResponse
    CurrentUserUpdateRequest:
      properties:
        username:
          type: string
