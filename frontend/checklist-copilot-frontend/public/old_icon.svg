<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Clipboard Check Icon</title>
  <desc id="desc">A dark rounded square icon with a purple gradient clipboard and centered check mark.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#120821"/>
      <stop offset="100%" stop-color="#1b0b2d"/>
    </linearGradient>

    <linearGradient id="purple" x1="130" y1="95" x2="390" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c66bff"/>
      <stop offset="48%" stop-color="#a349ff"/>
      <stop offset="100%" stop-color="#7728ff"/>
    </linearGradient>

    <radialGradient id="softGlow" cx="50%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#a64cff" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#6f28ff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0.58 0 0 0 0.35
                0 0.16 0 0 0.02
                0 0 1.00 0 0.95
                0 0 0 0.55 0" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="104" fill="url(#bg)"/>
  <rect width="512" height="512" rx="104" fill="url(#softGlow)"/>

  <!-- Clipboard outline -->
  <path
    d="M176 156
       H209
       V136
       C209 113.9 226.9 96 249 96
       H263
       C285.1 96 303 113.9 303 136
       V156
       H336
       C359.2 156 378 174.8 378 198
       V382
       C378 405.2 359.2 424 336 424
       H176
       C152.8 424 134 405.2 134 382
       V198
       C134 174.8 152.8 156 176 156
       Z
       M176 188
       C170.5 188 166 192.5 166 198
       V382
       C166 387.5 170.5 392 176 392
       H336
       C341.5 392 346 387.5 346 382
       V198
       C346 192.5 341.5 188 336 188
       H303
       V200
       H209
       V188
       H176
       Z"
    fill="url(#purple)"
    filter="url(#glow)"
    fill-rule="evenodd"/>

  <!-- Clipboard top clip -->
  <rect x="193" y="96" width="126" height="72" rx="24" fill="url(#purple)" filter="url(#glow)"/>
  <rect x="226" y="124" width="60" height="12" rx="6" fill="#1b0b2d"/>

  <!-- Inner dark panel, same as background so no extra rectangle is visible -->
  <rect x="166" y="188" width="180" height="204" rx="10" fill="url(#bg)"/>

  <!-- Centered check mark -->
  <path
    d="M205 276
       L245 316
       L319 242"
    fill="none"
    stroke="url(#purple)"
    stroke-width="34"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"/>
</svg>
